<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <h2 id="welcomeMsg"></h2>
  <p id="fecha"></p>

  <title>📝 Tareas</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
   <div class="container">
    <h1>📝 Mis Tareas</h1>
<button onclick="toggleTheme()" class="btn-theme">🌙 Modo</button>
 <div id="loginBox" class="login-box">
<h3>🆕 Registro</h3>

<input id="rnombre" type="text" placeholder="Nombre">
<input id="remail" type="email" placeholder="Email">

 <div style="position: relative;">
        <input id="rpassword" type="password" placeholder="Password">
        <span onclick="togglePassword()" style="position:absolute; right:10px; top:8px; cursor:pointer;">
          👁️
        </span>
</div>

<button class="btn-add" onclick="register()">Registrarse</button>
  <h3>🔐 Login</h3>

  <input id="email" type="email" placeholder="Email">
  <div style="position: relative;">
        <input id="password" type="password" placeholder="Password">
        <span onclick="toggleLoginPassword()"style="position:absolute; right:10px; top:8px; cursor:pointer;">
          👁️
        </span>
      </div>
  <button class="btn-add" onclick="login()">Entrar</button>

</div>

<div id="app" style="display:none;">
     <div class="input-group">
      <input id="tarea">
    <button class="btn-add" onclick="agregarTarea()">Agregar</button>
  </div>

    <div class="filtros">

      <button onclick="filtro('todas')">
        Todas <span id="total">0</span>
      </button>

 <button onclick="filtro('pendientes')">
        Pendientes <span id="pendientes">0</span>
      </button>

      <button onclick="filtro('completadas')">
        ✔ <span id="completadas">0</span>
      </button>

    </div>

    <ul id="lista"></ul>
    <button class="btn-logout" onclick="logout()">Salir 🚪</button>

</div>

<footer class="footer">
      Elaborado por ISC Diana Pichardo 🤓
    </footer>

  </div>
   <script src="app.js"></script>

</body>

</html>
