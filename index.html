<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>📝 Tareas</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
   <div class="container">
    <div class="top-bar">

    <label class="switch">
      <input type="checkbox" onclick="toggleTheme()" id="themeToggle">
      <span class="slider">
        <span class="icon sun">☀️</span>
        <span class="icon moon">🌙</span>
      </span>
    </label>

    <div id="fechaHora"></div>

  </div>

  <h2 id="welcomeMsg"></h2>

    <h1>📝 Mis Tareas</h1>
 <div id="loginBox" class="login-box">
<h3>🆕 Registro</h3>

<input id="rnombre" type="text" placeholder="Nombre">
<input id="remail" type="email" placeholder="Email">

 <<div class="password-box">
        <input id="rpassword" type="password" placeholder="Password">
       <span class="eye" onclick="togglePassword()">
            👁️
        </span>
</div>

<button class="btn-add" onclick="register()">Registrarse</button>
  <h3>🔐 Login</h3>

  <input id="email" type="email" placeholder="Email">
  <div class="password-box">
        <input id="password" type="password" placeholder="Password">
        <span class="eye" onclick="toggleLoginPassword()">
         👁️
        </span>
      </div>
  <button class="btn-add" onclick="login()">Entrar</button>

</div>

<div id="app" style="display:none;">
     <div class="input-group">
      <input id="tarea">
    <button class="btn-add" onclick="agregarTarea()">Agregar</button>
  </div>

    <div class="filtros">

      <button onclick="filtro('todas')">
        Todas <span id="total">0</span>
      </button>

 <button onclick="filtro('pendientes')">
        Pendientes <span id="pendientes">0</span>
      </button>

      <button onclick="filtro('completadas')">
        ✔ <span id="completadas">0</span>
      </button>

    </div>

    <ul id="lista"></ul>
    <button class="btn-logout" onclick="logout()">Salir 🚪</button>

</div>

<footer class="footer">
      Elaborado por ISC Diana Pichardo 🤓
    </footer>

  </div>
   <script src="app.js"></script>

</body>

</html>
